services:
  db:
    image: postgres:16-alpine
    container_name: sme-news-admin-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sme_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sme-news-admin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sme-news-admin-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sme_news
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sme-news-admin-worker
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sme_news
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sme-news-admin-beat
    command: ["celery", "-A", "app.celery_app:celery_app", "beat", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sme_news
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sme-news-admin
    ports:
      - "${APP_PORT:-3000}:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
