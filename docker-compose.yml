services:
  db:
    image: postgres:16-alpine
    container_name: sme-news-admin-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sme_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sme-news-admin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sme-news-admin-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sme_news
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      OPENCODE_BASE_URL: http://opencode-agent-adapter:8080
      OPENCODE_TIMEOUT_SECONDS: "60"
      OPENCODE_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sme-news-admin-worker
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sme_news
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sme-news-admin-beat
    command: ["celery", "-A", "app.celery_app:celery_app", "beat", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sme_news
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sme-news-admin
    ports:
      - "${APP_PORT:-3000}:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  opencode-server:
    image: ${OPENCODE_SERVER_IMAGE:-opencode/opencode:latest}
    container_name: sme-news-admin-opencode-server
    ports:
      - "${OPENCODE_SERVER_PORT:-4096}:4096"
    restart: unless-stopped
    environment:
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-changeme}
      OPENCODE_CONFIG_DIR: ${OPENCODE_CONFIG_DIR:-/opencode/config}
      OPENCODE_DEFAULT_MODEL: ${OPENCODE_DEFAULT_MODEL:-opencode/gpt-5-nano}
    volumes:
      - opencode-config:/opencode/config
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:4096/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  opencode-agent-adapter:
    image: ${OPENCODE_ADAPTER_IMAGE:-opencode/agent-adapter:latest}
    container_name: sme-news-admin-opencode-agent-adapter
    ports:
      - "${OPENCODE_ADAPTER_PORT:-8080}:8080"
    restart: unless-stopped
    environment:
      OPENCODE_BASE_URL: http://opencode-server:4096
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-changeme}
      OPENCODE_CONFIG_DIR: ${OPENCODE_CONFIG_DIR:-/opencode/config}
      MODEL_CATALOG_OVERRIDE: ${MODEL_CATALOG_OVERRIDE:-}
    volumes:
      - opencode-adapter-data:/adapter/data
    depends_on:
      opencode-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  opencode-config:
  opencode-adapter-data:
